<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LCA ICT – Drag & Drop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>LCA ICT – Drag & Drop</h1>
  <p>Drag the correct word into each sentence.</p>

  <h3>Word Bank</h3>
  <div id="wordBank" class="word-bank"></div>

  <h3>Questions</h3>
  <div id="quiz"></div>

  <button id="submitBtn">Submit</button>
  <button id="showAnswersBtn" class="hidden">Show Correct Answers</button>

  <div id="score"></div>
</div>

<!-- ✅ IMPORTANT: questions.js MUST be loaded first -->
<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
