<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizBlast 🎯</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- SETUP SCREEN -->
  <div id="setup-screen" class="screen active">
    <div class="setup-card">
      <div class="logo">Quiz<span>Blast</span> 🎯</div>
      <p class="tagline">Team trivia chaos for the classroom!</p>

      <div class="field-group">
        <label>Number of Teams</label>
        <div class="team-count-btns">
          <button class="count-btn active" data-count="2">2</button>
          <button class="count-btn" data-count="3">3</button>
          <button class="count-btn" data-count="4">4</button>
        </div>
      </div>

      <div id="team-names-container"></div>

      <div class="field-group">
        <label>Questions Per Game</label>
        <div class="team-count-btns">
          <button class="count-btn active" data-tiles="16">16</button>
          <button class="count-btn" data-tiles="25">25</button>
          <button class="count-btn" data-tiles="36">36</button>
        </div>
      </div>

      <button id="start-btn" class="start-btn">🚀 Start Game!</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <!-- Scoreboard -->
    <div id="scoreboard"></div>

    <!-- Board -->
    <div id="board-wrap">
      <div id="board"></div>
    </div>

    <!-- Current team indicator -->
    <div id="turn-indicator">
      <span id="turn-label">Team's Turn</span>
      <span id="turn-team"></span>
    </div>
  </div>

  <!-- QUESTION MODAL -->
  <div id="q-modal" class="modal hidden">
    <div class="modal-box">
      <div id="modal-tile-num"></div>
      <div id="modal-question"></div>
      <div id="modal-answer" class="hidden"></div>
      <div class="modal-actions">
        <button id="reveal-btn">👁 Reveal Answer</button>
        <button id="correct-btn" class="hidden correct-btn">✅ Correct!</button>
        <button id="wrong-btn" class="hidden wrong-btn">❌ Wrong</button>
      </div>
    </div>
  </div>

  <!-- POWERUP MODAL -->
  <div id="powerup-modal" class="modal hidden">
    <div class="modal-box powerup-box">
      <div class="powerup-icon" id="powerup-icon"></div>
      <div class="powerup-title" id="powerup-title"></div>
      <div class="powerup-desc" id="powerup-desc"></div>
      <button id="powerup-ok-btn">OK!</button>
    </div>
  </div>

  <!-- WINNER SCREEN -->
  <div id="winner-screen" class="screen">
    <div class="winner-card">
      <div class="confetti-wrap" id="confetti"></div>
      <div class="trophy">🏆</div>
      <h1 id="winner-title"></h1>
      <div id="final-scores"></div>
      <button id="play-again-btn">🔄 Play Again</button>
    </div>
  </div>

  <script src="data-ict.js"></script>
  <script src="game.js"></script>
</body>
</html>
